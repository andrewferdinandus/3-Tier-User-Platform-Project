name: CD Production Pipeline
on: 
  push:
    branches:
      - main
    paths:
      - k8-manifests/prod/app-deployment.yaml
      - .github/workflows/prod_cd_pipeline.yml

permissions: 
  contents: write  #update manifests via github actions
  id-token: write  #oidc token

jobs:
  promote-image-to-prod:
    name: Pull QA Latest and Retag for Prod
    runs-on: ubuntu-latest

    env:
      QA_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/multitier-platform:qa-latest
      PROD_LATEST_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/multitier-platform:prod-${{ github.sha }}

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: PUll QA Latest Image
        run: docker pull "${QA_IMAGE}"

      - name: Retag Image for Production
        run: |
          docker tag "${QA_IMAGE}" "${PROD_LATEST_IMAGE}"

      - name: Push Prod Image
        run: |
          docker push "${PROD_LATEST_IMAGE}"


  update-prod-manifest:
    name: Update Prod Manifest
    needs: promote-image-to-prod
    runs-on: ubuntu-latest
    permissions: 
      contents: write
      id-token: write

    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update Image tag in Production Manifest
        run: |
          sed -i "s|image: ${{ vars.DOCKERHUB_USERNAME }}/multitier-platform:.*|image: ${{ vars.DOCKERHUB_USERNAME }}/multitier-platform:prod-${{ github.sha }}|g" k8-manifests/prod/app-deployment.yaml 

      - name: Show Updated Manifest
        run: cat k8-manifests/prod/app-deployment.yaml

      - name: Commit and Push updated Prod Manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8-manifests/prod/app-deployment.yaml
          git commit -m "Update prod Image to ${{ github.sha }} [skip ci]" || echo "No Changes to Commit"
          git pull origin main --rebase
          git push origin main
           
  deploy-to-k8s:
    name: Deploy to Production Kubernetes
    needs: update-prod-manifest
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-southeast-2
      EKS_CLUSTER_NAME: my-cluster
      K8S_NAMESPACE: prod

    steps:
      - name: Checkout Latest Main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: COnfig AWS Credentials from Github OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup KUbectl
        uses: azure/setup-kubectl@v4

      - name: Generate Kubeconfig for EKS
        run: aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Verify Identity
        run: |
          aws sts get-caller-identity
          kubectl config current-context

      - name: Vefify Namespaces
        run: |
          kubectl get pods -n "${K8S_NAMESPACE}"
          kubectl get services -n "${K8S_NAMESPACE}"
          kubectl auth can-i create deployment -n "${K8S_NAMESPACE}"
          kubectl auth can-i create services -n "${K8S_NAMESPACE}"
          kubectl auth can-i create ingress.networking.k8s.io -n "${K8S_NAMESPACE}"
        
      - name: Deploy Prod Manifests
        run: |
          kubectl apply -f k8-manifests/${K8S_NAMESPACE}/ -n "${K8S_NAMESPACE}" 

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/nodejs-app -n "${K8S_NAMESPACE}" --timeout=180s
      











      
      
     
