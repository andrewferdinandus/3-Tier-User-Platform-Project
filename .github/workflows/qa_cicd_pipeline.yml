name: QA DevSecOps CICD Pipeline
on: 
 push:
   branches:
     - qa
   paths:
     - client/**
     - server/**
     - .github/workflows/qa_cicd_pipeline.yml

jobs:
  gitleaks-scan:
   name: Gitleaks Scan
   runs-on: ubuntu-latest
   steps:
     - name: Checkout Source Code
       uses: actions/checkout@v6
     - name: Run Gitlekas Scan
       run: |
         docker run --rm \
         -v "${{github.workspace}}:/repo" \
         zricethezav/gitleaks:latest detect \
         --source=/repo \
         --report-format=json \
         --report-path=/repo/gitleaks-report.json \
         --redact \
         --exit-code 0
     - name: Gitleaks Report
       uses: actions/upload-artifact@v7
       with:
         name: gitleaks-json
         path: gitleaks-report.json
         if-no-files-found: warn

  checkov-terraform:
    name: Checkov Terraform Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov Terraform Scan
        run: |
          checkov -d . \
          --framework terraform \
          --output json > checkov-terraform-report.json || true
      - name: Upload Checkov Terraform Report
        uses: actions/upload-artifact@v7
        with:
          name: Checkov Terraform Report
          path: checkov-terraform-report.json
          if-no-files-found: warn

  checkov-k8s:
    name: Checkov Kubernetes Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov Kubernetes Scan
        run: |
          checkov -d . \
          --framework kubernetes \
          --output json > checkov-kubernetes-report.json || true
      - name: Upload Checkov Kubernetes Report
        uses: actions/upload-artifact@v7
        with:
          name: Checkov Kubernetes Report
          path: checkov-kubernetes-report.json
          if-no-files-found: warn 

  checkov-dockerfile:
    name: Checkov Dockerfile Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Checkov
        run: pip install checkov
      - name: Run Checkov Dockerfile Scan
        run: |
          checkov -d . \
          --framework dockerfile \
          --output json > checkov-dockerfile-report.json || true
      - name: Upload Checkov Dockerfile Report
        uses: actions/upload-artifact@v7
        with:
          name: Checkov Dockerfile Report
          path: checkov-dockerfile-report.json
          if-no-files-found: warn

  client-trivy-fs:
    name: Client Trivy FS Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          cache: true
          version: latest
      - name: Trivi Installation Verification
        run: |
          trivy --version
          which trivy
          
      - name: Trivy FS vulnerability Scanning on Client (TABLE)
        run: |
          trivy fs ./client \
          --format table \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --exit-code 0 > client-trivy-fs-report.txt
      - name: Upload Trivy FS Client Report
        uses: actions/upload-artifact@v7
        with:
          name: Trivy Scan Report (Client)
          path: client-trivy-fs-report.txt
          if-no-files-found: warn 

  server-trivy-fs:
     name: Server Trivy FS Scan
     runs-on: ubuntu-latest
     needs: gitleaks-scan
     steps:
       - name: Checkout Source Code
         uses: actions/checkout@v6
       - name: Install Trivy
         uses: aquasecurity/setup-trivy@v0.2.6
         with:
           cache: true
           version: latest
       - name: Trivi Installation Verification
         run: |
           trivy --version
           which trivy
       - name: Trivy FS vulnerability Scanning on Server (TABLE)
         run: |
           trivy fs ./server \
           --format table \
           --severity HIGH,CRITICAL \
           --ignore-unfixed \
           --exit-code 0 > server-trivy-fs-report.txt
       - name: Upload Trivy FS Server Report
         uses: actions/upload-artifact@v7
         with:
           name: Trivy Scan Report (Server)
           path: server-trivy-fs-report.txt
           if-no-files-found: warn

  client-lint:
     name: Client Lint Scan
     runs-on: ubuntu-latest
     needs: 
       - client-trivy-fs
       - checkov-terraform
       - checkov-dockerfile
       - checkov-k8s

     defaults:
       run:
         working-directory: client
     steps: 
       - name: Source Code Checkout
         uses: actions/checkout@v6
       - name: Setup NodeJS
         uses: actions/setup-node@v4
         with:
           node-version: 19
           cache: npm
           cache-dependency-path: client/package.json
       - name: Install Client Dependencies
         run: npm ci
       - name: Run Client Lint
         run: npm run lint --if-present
         continue-on-error: true
  
  server-lint:
     name: Server Lint Scan
     runs-on: ubuntu-latest
     needs: 
       - server-trivy-fs
       - checkov-terraform
       - checkov-dockerfile
       - checkov-k8s

     defaults:
       run:
         working-directory: server
     steps: 
       - name: Source Code Checkout
         uses: actions/checkout@v6
       - name: Setup NodeJS
         uses: actions/setup-node@v4
         with:
           node-version: 19
           cache: npm
           cache-dependency-path: server/package.json
       - name: Install Server Dependencies
         run: npm ci
       - name: Run Server Lint
         run: npm run lint --if-present
         continue-on-error: true


  client-test:
     name: Client Test
     runs-on: ubuntu-latest
     needs: client-lint
       
     defaults:
       run:
         working-directory: client
     steps:
       - name: Source Code Checkout
         uses: actions/checkout@v6
       - name: Setup NodeJS
         uses: actions/setup-node@v4
         with:
           node-version: 19
           cache: npm
           cache-dependency-path: client/package.json

       - name: Install Client Dependencies
         run: npm ci
       - name: Run Client Test
         run: npm test --if-present
         continue-on-error: true

  server-test:
      name: Server Test
      runs-on: ubuntu-latest
      needs: server-lint
        
      defaults:
        run:
          working-directory: server
      steps:
        - name: Source Code Checkout
          uses: actions/checkout@v6
        - name: Setup NodeJS
          uses: actions/setup-node@v4
          with:
            node-version: 19
            cache: npm
            cache-dependency-path: server/package.json
 
        - name: Install Server Dependencies
          run: npm ci
        - name: Run Server Test
          run: npm test --if-present
          continue-on-error: true
          







         
      

